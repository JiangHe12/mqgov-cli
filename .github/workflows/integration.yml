name: Integration

# Real-backend integration tests (//go:build integration), run against live
# Kafka (Redpanda), RabbitMQ, Pulsar and RocketMQ containers started on the
# runner from the repo's docker-compose files. Kept SEPARATE from the PR/push CI
# and the release pipeline so a slow broker boot or a transient flake never
# blocks everyday commits or a release. Runs nightly and on manual dispatch only.

on:
  schedule:
    - cron: '0 6 * * *'   # daily 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  kafka:
    name: real-backend integration (kafka)
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 'stable'
          cache: true
      - name: Start Redpanda
        run: docker compose -f docker-compose.kafka.yml up -d
      - name: Wait for readiness
        shell: bash
        run: |
          set +e
          ok=0
          for i in $(seq 1 30); do
            if (echo > /dev/tcp/127.0.0.1/9092) 2>/dev/null; then ok=1; break; fi
            sleep 2
          done
          [ "$ok" = 1 ] || { echo "kafka not ready"; docker compose -f docker-compose.kafka.yml logs; exit 1; }
          ok=0
          for i in $(seq 1 40); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8081/subjects)
            if [ "$code" = "200" ]; then ok=1; break; fi
            sleep 3
          done
          [ "$ok" = 1 ] || { echo "schema registry not ready"; docker compose -f docker-compose.kafka.yml logs; exit 1; }
          sleep 5
      - name: Run integration tests
        env:
          KAFKA_BROKERS: 127.0.0.1:9092
          KAFKA_SCHEMA_REGISTRY_URL: http://127.0.0.1:8081
        run: go test -tags=integration -count=1 -v ./internal/backend/kafka/
      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.kafka.yml down -v || true

  kafka-acl:
    name: real-backend integration (kafka acl)
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 'stable'
          cache: true
      - name: Generate Redpanda TLS certificates
        shell: bash
        run: |
          mkdir -p testdata/redpanda-certs
          openssl req -x509 -newkey rsa:2048 -nodes -days 1 \
            -keyout testdata/redpanda-certs/ca.key \
            -out testdata/redpanda-certs/ca.crt \
            -subj "/CN=mqgov-redpanda-ca"
          openssl req -newkey rsa:2048 -nodes \
            -keyout testdata/redpanda-certs/server.key \
            -out testdata/redpanda-certs/server.csr \
            -subj "/CN=localhost" \
            -addext "subjectAltName=DNS:localhost,IP:127.0.0.1"
          openssl x509 -req -days 1 \
            -in testdata/redpanda-certs/server.csr \
            -CA testdata/redpanda-certs/ca.crt \
            -CAkey testdata/redpanda-certs/ca.key \
            -CAcreateserial \
            -out testdata/redpanda-certs/server.crt \
            -copy_extensions copy
          chmod a+r testdata/redpanda-certs/*
      - name: Start Redpanda
        run: docker compose -f docker-compose.kafka-acl.yml up -d
      - name: Enable SASL and authorization
        shell: bash
        run: |
          set -euo pipefail
          rpk() { docker compose -f docker-compose.kafka-acl.yml exec -T redpanda rpk -X brokers=127.0.0.1:9092 -X tls.enabled=true -X tls.ca=/certs/ca.crt "$@"; }
          ready=0
          for i in $(seq 1 40); do
            if rpk cluster info >/dev/null 2>&1; then ready=1; break; fi
            sleep 3
          done
          if [ "$ready" != 1 ]; then
            echo "redpanda TLS broker not ready"
            docker compose -f docker-compose.kafka-acl.yml ps
            docker compose -f docker-compose.kafka-acl.yml logs redpanda
            exit 1
          fi
          rpk acl user create admin -p admin-secret --mechanism SCRAM-SHA-256
          rpk cluster config set superusers '["admin"]'
          rpk cluster config set enable_sasl true
          sleep 5
      - name: Run ACL integration tests
        env:
          KAFKA_ACL_BROKERS: 127.0.0.1:9092
          KAFKA_ACL_USERNAME: admin
          KAFKA_ACL_PASSWORD: admin-secret
          KAFKA_ACL_SASL_MECHANISM: SCRAM-SHA-256
          KAFKA_ACL_TLS: "true"
          KAFKA_ACL_CA_CERT_FILE: ${{ github.workspace }}/testdata/redpanda-certs/ca.crt
        run: go test -tags=integration -count=1 -run TestKafkaACLIntegration -v ./internal/backend/kafka/
      - name: Dump broker logs on failure
        if: failure()
        run: docker compose -f docker-compose.kafka-acl.yml logs redpanda || true
      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.kafka-acl.yml down -v || true

  kafka-tls-pin:
    name: real-backend integration (kafka tls pin)
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 'stable'
          cache: true
      - name: Generate Redpanda TLS CA and server certificate
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p testdata/redpanda-certs
          openssl req -x509 -newkey rsa:2048 -nodes -days 1 \
            -keyout testdata/redpanda-certs/ca.key \
            -out testdata/redpanda-certs/ca.crt \
            -subj "/CN=mqgov-redpanda-ca"
          openssl req -newkey rsa:2048 -nodes \
            -keyout testdata/redpanda-certs/server.key \
            -out testdata/redpanda-certs/server.csr \
            -subj "/CN=localhost" \
            -addext "subjectAltName=DNS:localhost,IP:127.0.0.1"
          openssl x509 -req -days 1 \
            -in testdata/redpanda-certs/server.csr \
            -CA testdata/redpanda-certs/ca.crt \
            -CAkey testdata/redpanda-certs/ca.key \
            -CAcreateserial \
            -out testdata/redpanda-certs/server.crt \
            -copy_extensions copy
          chmod a+r testdata/redpanda-certs/*
      - name: Start Redpanda
        run: docker compose -f docker-compose.kafka-acl.yml up -d
      - name: Wait for readiness
        shell: bash
        run: |
          set -euo pipefail
          rpk() { docker compose -f docker-compose.kafka-acl.yml exec -T redpanda rpk -X brokers=127.0.0.1:9092 -X tls.enabled=true -X tls.ca=/certs/ca.crt "$@"; }
          ready=0
          for i in $(seq 1 40); do
            if rpk cluster info >/dev/null 2>&1; then ready=1; break; fi
            sleep 3
          done
          if [ "$ready" != 1 ]; then
            echo "redpanda TLS broker not ready"
            docker compose -f docker-compose.kafka-acl.yml ps
            docker compose -f docker-compose.kafka-acl.yml logs redpanda
            exit 1
          fi
      - name: First TLS pin succeeds
        env:
          KAFKA_TLS_PIN_BROKERS: 127.0.0.1:9092
          KAFKA_TLS_PIN_CA_CERT_FILE: ${{ github.workspace }}/testdata/redpanda-certs/ca.crt
          KAFKA_TLS_PIN_PATH: ${{ runner.temp }}/mqgov_tls_known_hosts
        run: go test -tags=integration -count=1 -run TestKafkaTLSPinningIntegration -v ./internal/backend/kafka/
      - name: Same TLS pin succeeds
        env:
          KAFKA_TLS_PIN_BROKERS: 127.0.0.1:9092
          KAFKA_TLS_PIN_CA_CERT_FILE: ${{ github.workspace }}/testdata/redpanda-certs/ca.crt
          KAFKA_TLS_PIN_PATH: ${{ runner.temp }}/mqgov_tls_known_hosts
        run: go test -tags=integration -count=1 -run TestKafkaTLSPinningIntegration -v ./internal/backend/kafka/
      - name: Restart Redpanda with different leaf certificate
        shell: bash
        run: |
          set -euo pipefail
          docker compose -f docker-compose.kafka-acl.yml down -v
          openssl req -newkey rsa:2048 -nodes \
            -keyout testdata/redpanda-certs/server.key \
            -out testdata/redpanda-certs/server.csr \
            -subj "/CN=localhost" \
            -addext "subjectAltName=DNS:localhost,IP:127.0.0.1"
          openssl x509 -req -days 1 \
            -in testdata/redpanda-certs/server.csr \
            -CA testdata/redpanda-certs/ca.crt \
            -CAkey testdata/redpanda-certs/ca.key \
            -CAcreateserial \
            -out testdata/redpanda-certs/server.crt \
            -copy_extensions copy
          chmod a+r testdata/redpanda-certs/*
          docker compose -f docker-compose.kafka-acl.yml up -d
      - name: Wait for replacement readiness
        shell: bash
        run: |
          set -euo pipefail
          rpk() { docker compose -f docker-compose.kafka-acl.yml exec -T redpanda rpk -X brokers=127.0.0.1:9092 -X tls.enabled=true -X tls.ca=/certs/ca.crt "$@"; }
          ready=0
          for i in $(seq 1 40); do
            if rpk cluster info >/dev/null 2>&1; then ready=1; break; fi
            sleep 3
          done
          if [ "$ready" != 1 ]; then
            echo "redpanda replacement TLS broker not ready"
            docker compose -f docker-compose.kafka-acl.yml ps
            docker compose -f docker-compose.kafka-acl.yml logs redpanda
            exit 1
          fi
      - name: Changed TLS pin fails
        env:
          KAFKA_TLS_PIN_BROKERS: 127.0.0.1:9092
          KAFKA_TLS_PIN_CA_CERT_FILE: ${{ github.workspace }}/testdata/redpanda-certs/ca.crt
          KAFKA_TLS_PIN_PATH: ${{ runner.temp }}/mqgov_tls_known_hosts
          KAFKA_TLS_PIN_EXPECT_FAILURE: "true"
        run: go test -tags=integration -count=1 -run TestKafkaTLSPinningIntegration -v ./internal/backend/kafka/
      - name: Dump broker logs on failure
        if: failure()
        run: docker compose -f docker-compose.kafka-acl.yml logs redpanda || true
      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.kafka-acl.yml down -v || true

  rabbitmq:
    name: real-backend integration (rabbitmq)
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 'stable'
          cache: true
      - name: Start RabbitMQ
        run: docker compose -f docker-compose.rabbitmq.yml up -d
      - name: Wait for readiness
        shell: bash
        run: |
          set +e
          ok=0
          for i in $(seq 1 40); do
            code=$(curl -s -o /dev/null -w '%{http_code}' -u guest:guest http://127.0.0.1:15672/api/overview)
            if [ "$code" = "200" ]; then ok=1; break; fi
            sleep 3
          done
          [ "$ok" = 1 ] || { echo "rabbitmq not ready"; docker compose -f docker-compose.rabbitmq.yml logs; exit 1; }
      - name: Run integration tests
        env:
          RABBITMQ_AMQP_URL: amqp://guest:guest@127.0.0.1:5672/
          RABBITMQ_MANAGEMENT_URL: http://127.0.0.1:15672
        run: go test -tags=integration -count=1 -v ./internal/backend/rabbitmq/
      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.rabbitmq.yml down -v || true

  pulsar:
    name: real-backend integration (pulsar)
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 'stable'
          cache: true
      - name: Start Pulsar
        run: docker compose -f docker-compose.pulsar.yml up -d
      - name: Wait for readiness
        shell: bash
        run: |
          set +e
          ok=0
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8080/admin/v2/clusters)
            if [ "$code" = "200" ]; then ok=1; break; fi
            sleep 3
          done
          [ "$ok" = 1 ] || { echo "pulsar not ready"; docker compose -f docker-compose.pulsar.yml logs; exit 1; }
      - name: Run integration tests
        env:
          PULSAR_SERVICE_URL: pulsar://127.0.0.1:6650
          PULSAR_ADMIN_URL: http://127.0.0.1:8080
        run: go test -tags=integration -count=1 -v ./internal/backend/pulsar/
      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.pulsar.yml down -v || true

  mirror:
    name: real-backend integration (kafka pulsar mirror)
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 'stable'
          cache: true
      - name: Start Redpanda and Pulsar
        run: |
          docker compose -f docker-compose.kafka.yml up -d
          docker compose -f docker-compose.pulsar.yml up -d
      - name: Wait for readiness
        shell: bash
        run: |
          set +e
          ok=0
          for i in $(seq 1 40); do
            if (echo > /dev/tcp/127.0.0.1/9092) 2>/dev/null; then ok=1; break; fi
            sleep 2
          done
          [ "$ok" = 1 ] || { echo "kafka not ready"; docker compose -f docker-compose.kafka.yml logs; exit 1; }
          ok=0
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8080/admin/v2/clusters)
            if [ "$code" = "200" ]; then ok=1; break; fi
            sleep 3
          done
          [ "$ok" = 1 ] || { echo "pulsar not ready"; docker compose -f docker-compose.pulsar.yml logs; exit 1; }
          sleep 5
      - name: Run CLI mirror integration tests
        env:
          KAFKA_BROKERS: 127.0.0.1:9092
          PULSAR_SERVICE_URL: pulsar://127.0.0.1:6650
          PULSAR_ADMIN_URL: http://127.0.0.1:8080
        run: go test -tags=integration -count=1 -run TestMessageMirrorCrossBrokerIntegration -v ./cmd/
      - name: Tear down
        if: always()
        run: |
          docker compose -f docker-compose.kafka.yml down -v || true
          docker compose -f docker-compose.pulsar.yml down -v || true

  rocketmq:
    name: real-backend integration (rocketmq)
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 'stable'
          cache: true
      - name: Start RocketMQ
        run: docker compose -f docker-compose.rocketmq.yml up -d
      - name: Wait for readiness
        shell: bash
        run: |
          set +e
          ok=0
          for i in $(seq 1 40); do
            if docker compose -f docker-compose.rocketmq.yml logs broker 2>/dev/null | grep -q 'boot success'; then ok=1; break; fi
            sleep 3
          done
          [ "$ok" = 1 ] || { echo "rocketmq not ready"; docker compose -f docker-compose.rocketmq.yml logs; exit 1; }
          sleep 5
      - name: Run integration tests
        env:
          ROCKETMQ_NAMESRV_ADDR: 127.0.0.1:9876
          ROCKETMQ_BROKER_ADDR: 127.0.0.1:10911
        run: go test -tags=integration -count=1 -v ./internal/backend/rocketmq/
      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.rocketmq.yml down -v || true
