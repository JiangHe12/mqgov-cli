services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://127.0.0.1:9092
    ports:
      - "9092:9092"
      # Redpanda's built-in Confluent-compatible Schema Registry (no separate
      # container: a standalone Confluent SR can't reach the broker, which only
      # advertises 127.0.0.1:9092 for the host-side tests).
      - "8081:8081"
